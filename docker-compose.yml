services:
  api:
    container_name: skillzone-api
    build: ./src
    ports:
      - "5001:8080"
    networks:
      - skillzone-network
    volumes:
      - ./src:/app
      - skillzone-obj:/app/obj
      - skillzone-bin:/app/bin
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=skillzone;Username=postgres;Password=postgres
      - JwtKey=gZ4j!7daO9O5pX@j@-#0)WU2E)0V0[3PTMB

  db:
    container_name: skillzone-database
    image: postgres:15
    networks:
      - skillzone-network
    environment:
      POSTGRES_DB: skillzone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  adminer:
    container_name: skillzone-adminer
    image: adminer
    networks:
      - skillzone-network
    ports:
      - "8080:8080"

networks:
  skillzone-network:
    driver: bridge

volumes:
  skillzone-obj:
  skillzone-bin:
